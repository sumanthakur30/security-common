# Imported by microservices via spring.config.import (optional) or copy keys into application.properties.
security.jwt.enforce=${SECURITY_JWT_ENFORCE:true}
security.jwt.secret=${SECURITY_JWT_SECRET:}
security.jwt.internal-api-key=${SECURITY_INTERNAL_API_KEY:${SECURITY_INVITE_INTERNAL_KEY:}}
security.gateway.enforce=${SECURITY_GATEWAY_ENFORCE:false}
security.entitlement-gate.enforce=${SECURITY_ENTITLEMENT_GATE_ENFORCE:false}
security.entitlement-gate.shop-service-base-url=${SERVICES_SHOP_BASE_URL:http://localhost:8080}
security.entitlement-gate.internal-api-key=${SECURITY_INTERNAL_API_KEY:${SECURITY_INVITE_INTERNAL_KEY:}}
